document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

play:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#000;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;font-weight:700;line-height:1.25\">Mathematicians Find a New Path Through Prime Deserts<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Today 06:02 · 12 min read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#000;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;font-weight:700;line-height:1.25\">Why Slime Molds Keep Solving Our Hardest Problems<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Yesterday · 8 min read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;border:3px solid #000;box-sizing:border-box;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;line-height:1.25\">A Century-Old Question About Turbulence Gets an Answer<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Yesterday · 15 min read · read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#000;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;font-weight:700;line-height:1.25\">The Physicist Rewriting the Rules of Phase Transitions<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Jul 2 · 11 min read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;border:3px solid #000;box-sizing:border-box;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;line-height:1.25\">How Ancient Starlight Bends Around Nothing at All<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Jul 1 · 10 min read · read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;border-bottom:2px solid #000;padding:32px 0;box-sizing:border-box;align-items:flex-start\">\n      <div style=\"width:22px;height:22px;border-radius:50%;background:#000;margin-top:16px;flex:none\"><\u002Fdiv>\n      <div style=\"flex:1;min-width:0\"><div style=\"font-size:40px;font-weight:700;line-height:1.25\">Inside the Proof That Shook Graph Theory<\u002Fdiv><div style=\"font-size:28px;font-style:italic;margin-top:10px\">Jun 30 · 14 min read<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;justify-content:space-between;min-height:120px;border-top:2px solid #000;padding:0 8px;box-sizing:border-box\">\n    <div style=\"font-size:30px\">‹ prev<\u002Fdiv>\n    <div style=\"text-align:center\"><div style=\"font-size:32px;font-weight:700\">1 / 3<\u002Fdiv><sc-if value=\"{{ showHints }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:26px;font-style:italic;margin-top:4px\">side buttons turn pages · tap to open<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n    <div style=\"font-size:30px\">next ›<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 1c READING — JOURNAL ============ -->\n<div class=\"dv-opt\" id=\"1c\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1c\">1c<\u002Fa>Reading view — Journal (42px body, footer controls)<\u002Fdiv>\n<div class=\"dv-card\" style=\"width:1264px\">\n<div data-screen-label=\"1c Reading Journal\" style=\"width:1264px;height:1680px;background:#ffffff;color:#000000;font-family:Georgia,'Times New Roman',serif;display:flex;flex-direction:column;box-sizing:border-box;padding:72px 96px 0\">\n  <div style=\"padding-bottom:24px;border-bottom:3px solid #000\">\n    <div style=\"font-size:28px;font-style:italic\">Quanta Magazine · Today 07:15 · 9 min read<\u002Fdiv>\n    <div style=\"font-size:58px;font-weight:700;line-height:1.15;letter-spacing:-1px;margin-top:18px;text-wrap:pretty\">The Simple Geometry That Predicts Ripples in Ice<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;font-size:42px;line-height:1.55;padding-top:40px;overflow:hidden\">\n    <p style=\"margin:0 0 36px;text-wrap:pretty\">When a sheet of ice forms over still water, its underside is rarely smooth. Instead, regular ripples appear — crests and troughs spaced with an eerie consistency, as if the freezing front were following a score.<\u002Fp>\n    <p style=\"margin:0 0 36px;text-wrap:pretty\">For decades, glaciologists treated these patterns as noise. Now a small team of applied mathematicians has shown that the spacing obeys a single geometric rule, one simple enough to write on a napkin and general enough to hold from lake ice to the shells of frozen moons.<\u002Fp>\n    <p style=\"margin:0 0 36px;text-wrap:pretty\">The rule connects the thickness of the ice to the speed of the water moving beneath it. Where the flow is fast, heat is carried away unevenly, and the freezing boundary begins to undulate. The wavelength that wins out, the team proved, is always close to five times the ice thickness.<\u002Fp>\n    <p style=\"margin:0;text-wrap:pretty\">\"We kept waiting for the exceptions,\" one author said. \"They never came.\" The result has already been used to read the flow history of a lake from a single ice core.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:stretch;border-top:3px solid #000;min-height:124px;margin:0 -96px;padding:0 40px;box-sizing:border-box\">\n    <div style=\"display:flex;align-items:center;gap:16px;font-size:34px;padding:0 32px\">☆ <span style=\"font-size:30px\">Save<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;font-size:34px;padding:0 32px;border-left:2px solid #000\">Aa<\u002Fdiv>\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;font-size:30px;font-style:italic\">Page 1 of 6<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;font-size:30px;padding:0 32px;border-left:2px solid #000\">Next article ›<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<p class=\"dv-next\">Try next: \"add a Settings screen (sync interval, font size, mark-all-read)\" · \"add the end-of-article next/prev screen\" · \"show the Aa font-size overlay from the reading view\"<\u002Fp>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showHints&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { showHints: this.props.showHints ?? true };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
